# trigger
name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t bandungbus-backend ./backend
          docker tag bandungbus-backend:latest 466825170324.dkr.ecr.ap-southeast-1.amazonaws.com/bandungbus-backend:latest

      - name: Push backend image
        run: |
          docker push 466825170324.dkr.ecr.ap-southeast-1.amazonaws.com/bandungbus-backend:latest

      - name: Build frontend image
        run: |
          docker build -t bandungbus-frontend ./frontend
          docker tag bandungbus-frontend:latest 466825170324.dkr.ecr.ap-southeast-1.amazonaws.com/bandungbus-frontend:latest

      - name: Push frontend image
        run: |
          docker push 466825170324.dkr.ecr.ap-southeast-1.amazonaws.com/bandungbus-frontend:latest

      - name: Redeploy backend service
        run: |
          aws ecs update-service \
            --cluster bandungbus-cluster \
            --service backend-service \
            --force-new-deployment

      - name: Redeploy frontend service
        run: |
          aws ecs update-service \
            --cluster bandungbus-cluster \
            --service frontend-service \
            --force-new-deployment